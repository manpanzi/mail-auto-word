name: Auto Word Reply

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check-and-reply:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
        run: python mail_auto_word.py --once

      - name: Commit state
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add processed_uids.json
          git diff --staged --quiet || git commit -m "update processed uids"
          git push https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git

